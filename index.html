<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Tasks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0f172a" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My Tasks" />

  <!-- iOS touch icon via canvas -->
  <script>
    (function() {
      var c = document.createElement('canvas');
      c.width = 192; c.height = 192;
      var ctx = c.getContext('2d');
      ctx.fillStyle = '#0f172a';
      ctx.beginPath();
      var r = 32;
      ctx.moveTo(r,0); ctx.lineTo(192-r,0); ctx.quadraticCurveTo(192,0,192,r);
      ctx.lineTo(192,192-r); ctx.quadraticCurveTo(192,192,192-r,192);
      ctx.lineTo(r,192); ctx.quadraticCurveTo(0,192,0,192-r);
      ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
      ctx.closePath(); ctx.fill();
      var rows = [{y:72,checked:true},{y:104,checked:false},{y:136,checked:true}];
      rows.forEach(function(row) {
        ctx.strokeStyle='#38bdf8'; ctx.lineWidth=5;
        ctx.beginPath(); ctx.arc(52,row.y,10,0,2*Math.PI); ctx.stroke();
        if(row.checked){
          ctx.strokeStyle='#38bdf8'; ctx.lineWidth=4;
          ctx.lineCap='round'; ctx.lineJoin='round';
          ctx.beginPath(); ctx.moveTo(47,row.y); ctx.lineTo(51,row.y+5); ctx.lineTo(58,row.y-6); ctx.stroke();
        }
        ctx.fillStyle='#bae6fd';
        ctx.beginPath();
        ctx.roundRect(72,row.y-5,row.checked?72:60,10,5); ctx.fill();
      });
      var link=document.createElement('link');
      link.rel='apple-touch-icon';
      link.href=c.toDataURL('image/png');
      document.head.appendChild(link);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-aurora">

  <header>
    <h1>My Tasks</h1>
    <div class="header-right">
      <div class="mode-pill" id="mode-display" title="Tap to change energy mode"></div>
    </div>
  </header>

  <main>

    <!-- Daily Snapshot Banner -->
    <div class="snapshot-banner" id="snapshot-banner"></div>

    <!-- Energy Mode Selector -->
    <section class="mode-selector" id="mode-selector">
      <button class="mode-btn active" data-mode="normal">Normal</button>
      <button class="mode-btn" data-mode="deep">Deep Work</button>
      <button class="mode-btn" data-mode="low">Low Energy</button>
      <button class="mode-btn" data-mode="social">Social Recovery</button>
    </section>

    <!-- Add Task Form -->
    <form id="task-form">
      <input id="task-input" type="text" placeholder="Capture anything..." required />
      <button type="submit">Add</button>
    <input type="file" id="file-input" accept=".txt" hidden />
        <label for="file-input" class="import-btn">↑ Import</label>
    </form>

    <!-- Tag selector -->
    <div class="tag-row" id="tag-row">
      <span class="tag-label">Tag:</span>
      <button class="tag-btn active" data-tag="general">General</button>
      <button class="tag-btn" data-tag="work">Work</button>
      <button class="tag-btn" data-tag="social">Social</button>
      <button class="tag-btn" data-tag="later">Later</button>
    </div>

      <div id="import-status" class="import-status"></div>
    
    <!-- Filters -->
    <section class="filters">
      <button data-filter="all" class="active">All</button>
      <button data-filter="today">Today</button>
      <button data-filter="pending">Pending</button>
      <button data-filter="completed">Done</button>
    </section>

    <!-- Task list -->
    <ul id="task-list"></ul>

    <!-- Next Tiny Step modal -->
    <div class="nts-overlay" id="nts-overlay" hidden>
      <div class="nts-card">
        <p class="nts-title">What's the tiniest next step?</p>
        <p class="nts-task-name" id="nts-task-name"></p>
        <input id="nts-input" type="text" placeholder="e.g. Open file and add one function" />
        <div class="nts-actions">
          <button id="nts-save">Save step</button>
          <button id="nts-cancel" class="nts-cancel">Cancel</button>
        </div>
      </div>
    </div>

  </main>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
