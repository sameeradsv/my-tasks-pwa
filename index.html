<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Tasks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0f172a" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My Tasks" />

  <!-- iOS touch icon via canvas -->
  <script>
    (function() {
      var c = document.createElement('canvas');
      c.width = 192; c.height = 192;
      var ctx = c.getContext('2d');
      ctx.fillStyle = '#0f172a';
      ctx.beginPath();
      var r = 32;
      ctx.moveTo(r,0); ctx.lineTo(192-r,0); ctx.quadraticCurveTo(192,0,192,r);
      ctx.lineTo(192,192-r); ctx.quadraticCurveTo(192,192,192-r,192);
      ctx.lineTo(r,192); ctx.quadraticCurveTo(0,192,0,192-r);
      ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
      ctx.closePath(); ctx.fill();
      var rows = [{y:72,checked:true},{y:104,checked:false},{y:136,checked:true}];
      rows.forEach(function(row) {
        ctx.strokeStyle='#38bdf8'; ctx.lineWidth=5;
        ctx.beginPath(); ctx.arc(52,row.y,10,0,2*Math.PI); ctx.stroke();
        if(row.checked){
          ctx.strokeStyle='#38bdf8'; ctx.lineWidth=4;
          ctx.lineCap='round'; ctx.lineJoin='round';
          ctx.beginPath(); ctx.moveTo(47,row.y); ctx.lineTo(51,row.y+5); ctx.lineTo(58,row.y-6); ctx.stroke();
        }
        ctx.fillStyle='#bae6fd';
        ctx.beginPath();
        ctx.roundRect(72,row.y-5,row.checked?72:60,10,5); ctx.fill();
      });
      var link=document.createElement('link');
      link.rel='apple-touch-icon';
      link.href=c.toDataURL('image/png');
      document.head.appendChild(link);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="slate">
    <canvas id="bg-canvas"></canvas>
  <script>
    const T={slate:['#0f172a','#1e293b','#38bdf8'],forest:['#022c22','#064e3b','#10b981'],ocean:['#172554','#1e3a8a','#60a5fa'],dusk:['#2e1065','#4c1d95','#c084fc'],graphite:['#18181b','#27272a','#a1a1aa'],cocoa:['#451a03','#78350f','#fbbf24']};
    let cv=document.getElementById('bg-canvas'),ctx,orbs=[],cT='slate';
    function init(){cv.width=innerWidth;cv.height=innerHeight;ctx=cv.getContext('2d');addEventListener('resize',()=>{cv.width=innerWidth;cv.height=innerHeight;});makeOrbs();animate();}
    function makeOrbs(){const c=T[cT];orbs=[];for(let i=0;i<7;i++)orbs.push({x:Math.random()*cv.width,y:Math.random()*cv.height,vx:(Math.random()-0.5)*0.4,vy:(Math.random()-0.5)*0.4,r:Math.random()*160+100,col:c[i%3]});}
        function animate(){ctx.clearRect(0,0,cv.width,cv.height);const grad=ctx.createRadialGradient(cv.width/2,cv.height/2,0,cv.width/2,cv.height/2,Math.max(cv.width,cv.height));grad.addColorStop(0,T[cT][0]);grad.addColorStop(1,T[cT][1]);ctx.fillStyle=grad;ctx.fillRect(0,0,cv.width,cv.height);orbs.forEach(o=>{o.x+=o.vx;o.y+=o.vy;if(o.x<-o.r||o.x>cv.width+o.r)o.vx*=-1;if(o.y<-o.r||o.y>cv.height+o.r)o.vy*=-1;const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);g.addColorStop(0,o.col+'80');g.addColorStop(1,o.col+'00');ctx.fillStyle=g;ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fill();});requestAnimationFrame(animate);}
    document.body.addEventListener('data-theme-change',e=>{cT=e.detail;makeOrbs();});
    init();
  </script>

  <header>
    <h1>My Tasks</h1>
  </header>

  <main>
    <form id="task-form">
      <input id="task-input" type="text" placeholder="Add a task..." required />
      <button type="submit">Add</button>
    </form>

    <section class="filters">
      <button data-filter="all" class="active">All</button>
      <button data-filter="pending">Pending</button>
      <button data-filter="completed">Done</button>
    </section>

    <ul id="task-list"></ul>
  </main>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
